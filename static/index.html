<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-end;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .message.user .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.assistant .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .message-audio {
            margin-top: 8px;
        }
        
        .message-audio audio {
            width: 100%;
            height: 32px;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .record-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: #667eea;
            color: white;
        }
        
        .record-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .record-btn.recording {
            background: #e74c3c;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }
        
        .record-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            height: 18px;
        }
        
        .session-info {
            text-align: center;
            font-size: 11px;
            color: #bbb;
            margin-top: 10px;
        }
        
        .new-chat-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            color: #666;
        }
        
        .new-chat-btn:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ 语音助手</h1>
            <p>按住说话，AI 语音回复你</p>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="message-bubble">
                    你好！我是你的语音助手，点击下面的按钮开始说话吧~
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="controls">
                <button class="new-chat-btn" onclick="newChat()">新对话</button>
                <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
                    🎤 按住说话
                </button>
            </div>
            <div class="status" id="status">准备就绪</div>
            <div class="session-info" id="sessionInfo"></div>
        </div>
    </div>

    <script>
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let sessionId = null;

        // 页面加载时创建会话
        window.onload = async function() {
            await createSession();
        };

        // 创建新会话
        async function createSession() {
            try {
                const response = await fetch('/api/session/create', {
                    method: 'POST'
                });
                const data = await response.json();
                sessionId = data.session_id;
                document.getElementById('sessionInfo').textContent = `会话ID: ${sessionId.substring(0, 8)}...`;
            } catch (e) {
                console.error('创建会话失败:', e);
            }
        }

        // 新对话
        async function newChat() {
            if (confirm('确定要开始新对话吗？当前对话历史会清空。')) {
                document.getElementById('chatArea').innerHTML = `
                    <div class="message assistant">
                        <div class="message-bubble">
                            你好！我是你的语音助手，点击下面的按钮开始说话吧~
                        </div>
                    </div>
                `;
                await createSession();
            }
        }

        // 切换录音状态
        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        // 开始录音
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await sendAudio(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                
                const btn = document.getElementById('recordBtn');
                btn.classList.add('recording');
                btn.textContent = '⏹️ 松开结束';
                document.getElementById('status').textContent = '正在录音...';

            } catch (e) {
                console.error('录音失败:', e);
                alert('无法访问麦克风，请检查权限设置');
            }
        }

        // 停止录音
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                const btn = document.getElementById('recordBtn');
                btn.classList.remove('recording');
                btn.textContent = '🎤 按住说话';
                document.getElementById('status').textContent = '正在处理...';
            }
        }

        // 发送音频到服务器
        async function sendAudio(audioBlob) {
            try {
                const formData = new FormData();
                formData.append('audio', audioBlob, 'recording.webm');
                formData.append('session_id', sessionId);

                // 显示用户消息
                addMessage('user', '（语音消息）', null);

                const response = await fetch('/api/chat/voice', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    // 更新用户消息（显示识别的文字）
                    const userMessages = document.querySelectorAll('.message.user');
                    const lastUserMsg = userMessages[userMessages.length - 1];
                    lastUserMsg.querySelector('.message-bubble').textContent = data.user_text;

                    // 添加 AI 回复
                    addMessage('assistant', data.reply_text, data.audio_url);

                    // 自动播放语音
                    const audios = document.querySelectorAll('audio');
                    const lastAudio = audios[audios.length - 1];
                    if (lastAudio) {
                        lastAudio.play();
                    }

                    document.getElementById('status').textContent = '回复完成';
                } else {
                    document.getElementById('status').textContent = '出错了: ' + data.detail;
                }

            } catch (e) {
                console.error('发送失败:', e);
                document.getElementById('status').textContent = '网络错误';
            }

            // 3秒后清空状态
            setTimeout(() => {
                document.getElementById('status').textContent = '准备就绪';
            }, 3000);
        }

        // 添加消息到聊天区
        function addMessage(role, text, audioUrl) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            let audioHtml = '';
            if (audioUrl) {
                audioHtml = `
                    <div class="message-audio">
                        <audio controls src="${audioUrl}"></audio>
                    </div>
                `;
            }

            messageDiv.innerHTML = `
                <div class="message-bubble">
                    ${text}
                    ${audioHtml}
                </div>
            `;

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
    </script>
</body>
</html>
